<div class="app-page">
  <div class="page-card" style="max-width: 500px;">
    <header class="page-header">
      <h1>PDIGS</h1>
      <p>Gestiona a tus mascotas en un solo lugar.</p>
    </header>

    <div class="page-body">
      <div *ngIf="isLogin" class="form-container">
        <h2>Iniciar Sesión</h2>
        <form [formGroup]="loginForm" (ngSubmit)="onLogin()">
          <div class="form-group">
            <label for="login-email">Email:</label>
            <input id="login-email" type="email" formControlName="email" class="form-control">
          </div>
          <div class="form-group">
            <label for="login-password">Contraseña:</label>
            <input id="login-password" type="password" formControlName="password" class="form-control">
          </div>
          <button type="submit" class="btn btn-primary w-100" [disabled]="!loginForm.valid">Iniciar Sesión</button>
        </form>
        <p class="mt-3">¿No tienes cuenta? <button type="button" class="btn btn-link p-0" (click)="toggleForm()">Regístrate</button></p>
      </div>

      <div *ngIf="!isLogin" class="form-container">
        <h2>Registrarse</h2>
        <form [formGroup]="registerForm" (ngSubmit)="onRegister()">
          <div class="form-group">
            <label for="register-name">Nombre:</label>
            <input id="register-name" type="text" formControlName="name" class="form-control">
          </div>
          <div class="form-group">
            <label for="register-lastName">Apellidos:</label>
            <input id="register-lastName" type="text" formControlName="lastName" class="form-control">
          </div>
          <div class="form-group">
            <label for="register-username">Nombre de Usuario:</label>
            <input id="register-username" type="text" formControlName="username" class="form-control">
          </div>
          <div class="form-group">
            <label for="register-email">Correo:</label>
            <input id="register-email" type="email" formControlName="email" class="form-control">
          </div>
          <div class="form-group">
            <label for="register-password">Contraseña:</label>
            <input id="register-password" type="password" formControlName="password" class="form-control">
          </div>
          <button type="submit" class="btn btn-primary w-100" [disabled]="!registerForm.valid">Registrarse</button>
        </form>
        <p class="mt-3">¿Ya tienes cuenta? <button type="button" class="btn btn-link p-0" (click)="toggleForm()">Iniciar Sesión</button></p>
      </div>
    </div>
  </div>
</div>
