<div class="app-page">
  <div class="page-card">
    <header class="page-header">
      <h1>Mapa de tu Zona</h1>
      <p>Ubicación actual o zona por defecto.</p>
    </header>

    <div class="page-body">
      <google-map
        [center]="center"
        [zoom]="zoom"
        [options]="mapOptions"
        width="100%"
        height="600px">
      </google-map>
    </div>
  </div>
</div>
