<div class="app-page">
  <div class="page-card" style="max-width: 500px;">
    <header class="page-header">
      <h1>PDIGS</h1>
      <p>{{ 'login.subtitle' | translate }}</p>
    </header>

    <div class="page-body">
      @if (isLogin) {
        <div class="form-container">
          <h2>{{ 'login.loginTitle' | translate }}</h2>
          <form [formGroup]="loginForm" (ngSubmit)="onLogin()">
            <div class="form-group">
              <label for="login-email">{{ 'login.email' | translate }}:</label>
              <input id="login-email" type="email" formControlName="email" class="form-control">
            </div>
            <div class="form-group">
              <label for="login-password">{{ 'login.password' | translate }}:</label>
              <input id="login-password" type="password" formControlName="password" class="form-control">
            </div>
            <button [disabled]="!loginForm.valid" class="btn btn-primary w-100"
                    type="submit">{{ 'login.loginButton' | translate }}
            </button>
          </form>
          <p class="mt-3">{{ 'login.noAccount' | translate }}
            <button (click)="toggleForm()" class="btn btn-link p-0"
                    type="button">{{ 'login.registerLink' | translate }}
            </button>
          </p>
        </div>
      }

      @if (!isLogin) {
        <div class="form-container">
          <h2>{{ 'login.registerTitle' | translate }}</h2>
          <form [formGroup]="registerForm" (ngSubmit)="onRegister()">
            <div class="form-group">
              <label for="register-name">{{ 'login.name' | translate }}:</label>
              <input id="register-name" type="text" formControlName="name" class="form-control">
            </div>
            <div class="form-group">
              <label for="register-lastName">{{ 'login.lastName' | translate }}:</label>
              <input id="register-lastName" type="text" formControlName="lastName" class="form-control">
            </div>
            <div class="form-group">
              <label for="register-username">{{ 'login.username' | translate }}:</label>
              <input id="register-username" type="text" formControlName="username" class="form-control">
            </div>
            <div class="form-group">
              <label for="register-email">{{ 'login.email' | translate }}:</label>
              <input id="register-email" type="email" formControlName="email" class="form-control">
            </div>
            <div class="form-group">
              <label for="register-password">{{ 'login.password' | translate }}:</label>
              <input id="register-password" type="password" formControlName="password" class="form-control">
            </div>
            <button [disabled]="!registerForm.valid" class="btn btn-primary w-100"
                    type="submit">{{ 'login.registerButton' | translate }}
            </button>
          </form>
          <p class="mt-3">{{ 'login.hasAccount' | translate }}
            <button (click)="toggleForm()" class="btn btn-link p-0" type="button">{{ 'login.loginLink' | translate }}
            </button>
          </p>
        </div>
      }
    </div>
  </div>
</div>
