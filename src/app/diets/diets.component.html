<div class="app-page">
  <div class="page-card">
    <header class="page-header">
      <h1>Dietas de Mascotas</h1>
      <p>Gestiona planes de alimentación por mascota.</p>
    </header>

    <div class="page-body">
      <div class="row">
        <div class="col-md-4">
          <h3>Seleccionar Mascota</h3>
          <div class="list-group">
            <button
              *ngFor="let pet of pets"
              type="button"
              class="list-group-item list-group-item-action"
              [ngClass]="{'active': selectedPetId === pet.id}"
              (click)="selectPet(pet.id)">
              {{ pet.name }} ({{ pet.type }})
            </button>
          </div>
        </div>

        <div class="col-md-8" *ngIf="selectedPetId">
          <h3>Dietas para {{ getSelectedPetName() }}</h3>
          <button class="btn btn-success mb-3" (click)="showCreateForm()">Crear Dieta</button>

          <div *ngIf="showForm" class="card mb-4">
            <div class="card-header">
              <h5>{{ isEditing ? 'Editar Dieta' : 'Crear Nueva Dieta' }}</h5>
            </div>
            <div class="card-body">
              <form [formGroup]="dietForm" (ngSubmit)="saveDiet()">
                <div class="mb-3">
                  <label for="name" class="form-label">Nombre de la Dieta</label>
                  <input type="text" class="form-control" id="name" formControlName="name" required>
                </div>
                <div class="mb-3">
                  <label for="description" class="form-label">Descripción</label>
                  <textarea class="form-control" id="description" formControlName="description" rows="3" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary me-2" [disabled]="!dietForm.valid">Guardar</button>
                <button type="button" class="btn btn-secondary" (click)="cancelForm()">Cancelar</button>
              </form>
            </div>
          </div>

          <div class="table-responsive">
            <table class="table table-striped table-hover">
              <thead class="table-dark">
                <tr>
                  <th>Nombre</th>
                  <th>Descripción</th>
                  <th>Acciones</th>
                </tr>
              </thead>
              <tbody>
                <tr *ngFor="let diet of diets">
                  <td>{{ diet.name }}</td>
                  <td>{{ diet.description }}</td>
                  <td>
                    <button class="btn btn-warning btn-sm me-2" (click)="showEditForm(diet)">Editar</button>
                    <button class="btn btn-danger btn-sm" (click)="deleteDiet(diet.id)">Eliminar</button>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
