<div class="d-flex vh-100 w-100">
  <!-- Sidebar -->
  <div class="bg-dark text-white p-3" style="width: 250px; min-height: 100vh;">
    <div class="text-center mb-4">
      <img [src]="userPhotoURL" alt="Foto de usuario" class="rounded-circle mb-2" style="width: 80px; height: 80px;">
      <h5>{{ userName }}</h5>
    </div>
    <nav class="nav flex-column">
      <a class="nav-link text-white" routerLink="pets" routerLinkActive="active">
        <i class="fas fa-paw me-2"></i>Mascotas
      </a>
      <a class="nav-link text-white" routerLink="diets" routerLinkActive="active">
        <i class="fas fa-utensils me-2"></i>Dietas
      </a>
      <a class="nav-link text-white" routerLink="diary" routerLinkActive="active">
        <i class="fas fa-book me-2"></i>Diario
      </a>
      <a class="nav-link text-white" routerLink="medical-records" routerLinkActive="active">
        <i class="fas fa-stethoscope me-2"></i>Registros Médicos
      </a>
      <a class="nav-link text-white" routerLink="calendar" routerLinkActive="active">
        <i class="fas fa-calendar me-2"></i>Calendario
      </a>
      <a class="nav-link text-white" routerLink="map" routerLinkActive="active">
        <i class="fas fa-map me-2"></i>Mapa
      </a>
      <a class="nav-link text-white" routerLink="finances" routerLinkActive="active">
        <i class="fas fa-dollar-sign me-2"></i>Finanzas
      </a>
      <hr class="my-3">
      <a class="nav-link text-white" (click)="logout()" style="cursor: pointer;">
        <i class="fas fa-sign-out-alt me-2"></i>Cerrar Sesión
      </a>
    </nav>
  </div>

  <!-- Main Content -->
  <div class="flex-grow-1 bg-light">
    <router-outlet></router-outlet>
  </div>
</div>
