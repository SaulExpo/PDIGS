<div class="d-flex vh-100 w-100">
  <div class="dashboard-sidebar bg-dark text-white p-3">
    <div class="text-center mb-4">
      <img [src]="userPhotoURL" [alt]="'sidebar.userPhotoAlt' | translate" class="rounded-circle mb-2 sidebar-avatar">
      <h5>{{ userName }}</h5>
    </div>

    <nav class="nav flex-column">
      <a class="nav-link text-white" routerLink="pets" routerLinkActive="active">
        <i class="fas fa-paw me-2"></i>{{ 'sidebar.pets' | translate }}
      </a>
      <a class="nav-link text-white" routerLink="diets" routerLinkActive="active">
        <i class="fas fa-utensils me-2"></i>{{ 'sidebar.diets' | translate }}
      </a>
      <a class="nav-link text-white" routerLink="diary" routerLinkActive="active">
        <i class="fas fa-book me-2"></i>{{ 'sidebar.diary' | translate }}
      </a>
      <a class="nav-link text-white" routerLink="medical-records" routerLinkActive="active">
        <i class="fas fa-stethoscope me-2"></i>{{ 'sidebar.medicalRecords' | translate }}
      </a>
      <a class="nav-link text-white" routerLink="calendar" routerLinkActive="active">
        <i class="fas fa-calendar me-2"></i>{{ 'sidebar.calendar' | translate }}
      </a>
      <a class="nav-link text-white" routerLink="map" routerLinkActive="active">
        <i class="fas fa-map me-2"></i>{{ 'sidebar.map' | translate }}
      </a>
      <a class="nav-link text-white" routerLink="finances" routerLinkActive="active">
        <i class="fas fa-dollar-sign me-2"></i>{{ 'sidebar.finances' | translate }}
      </a>

      <hr class="my-3">

      <div class="language-selector mb-3">
        <label for="sidebar-language" class="form-label text-uppercase small">{{ 'sidebar.language' | translate }}</label>
        <select
          id="sidebar-language"
          class="form-select form-select-sm"
          [value]="currentLanguage"
          (change)="setLanguage($any($event.target).value)">
          <option value="es">{{ 'sidebar.lang.es' | translate }}</option>
          <option value="en">{{ 'sidebar.lang.en' | translate }}</option>
        </select>
      </div>

      <a class="nav-link text-white" (click)="logout()" style="cursor: pointer;">
        <i class="fas fa-sign-out-alt me-2"></i>{{ 'sidebar.logout' | translate }}
      </a>
    </nav>
  </div>

  <div class="flex-grow-1 bg-light">
    <router-outlet></router-outlet>
  </div>
</div>
